version: '3.9'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:placeholder-replace-with-php-artisan-key-generate
      APP_URL: http://localhost:8080
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/data/database.sqlite
      FRONTEND_URL: http://localhost:5173
      LOG_CHANNEL: stderr
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    volumes:
      - sqlite_data:/var/data

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080/api/v1
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  sqlite_data:
